<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For Deesha 🎂</title>

<style>
body{
  margin:0;
  background:black;
  color:white;
  font-family:Segoe UI;
  text-align:center;
  overflow:hidden;
}

/* 🌌 STARS */
#stars{
  position:fixed;
  width:100%;
  height:100%;
  top:0;
  left:0;
  z-index:-1;
  overflow:hidden;
}
.star{
  position:absolute;
  width:2px;
  height:2px;
  background:white;
  border-radius:50%;
  opacity:0.8;
  animation: twinkle 2s infinite alternate;
}
@keyframes twinkle{
  from{opacity:0.2;}
  to{opacity:1;}
}

/* screens */
.screen{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:90%;
  opacity:0;
  transition:1s ease;
}
.show{opacity:1;}

h1{color:#ff66aa;}

button{
  padding:12px 20px;
  border:none;
  border-radius:20px;
  background:#ff66aa;
  color:white;
}

/* 🌳 TREE */
#treeCanvas{
  position:absolute;
  width:100%;
  height:100%;
  top:0;
  left:0;
  z-index:0; /* ✅ FIX */
}

#s0{
  z-index:1; /* ✅ FIX */
}

#clickHeart{
  position:absolute;
  bottom:80px;
  width:100%;
  text-align:center;
  color:#ff99cc;
  cursor:pointer;
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.1);}
  100%{transform:scale(1);}
}

/* cake */
#cake{
  font-size:90px;
  text-shadow:0 0 20px orange,0 0 40px red;
  animation:glow 1s infinite alternate;
}
@keyframes glow{
  from{ text-shadow:0 0 10px orange; }
  to{ text-shadow:0 0 40px red; }
}

/* animations */
@keyframes float{
  from{transform:translateY(100vh);}
  to{transform:translateY(-10vh);}
}
@keyframes fall{
  to{transform:translateY(100vh);}
}
@keyframes fly{
  from{transform:translateY(-100px);opacity:0;}
  to{transform:translateY(0);opacity:1;}
}

/* slides */
.slide{
  width:240px;
  border-radius:12px;
  display:none;
  opacity:0;
  transform:scale(0.8) rotate(-5deg);
  transition:0.6s;
}
.slide.active{
  display:block;
  opacity:1;
  transform:scale(1) rotate(0deg);
}

#photoMsg{
  margin-top:15px;
  color:#ffccdd;
  min-height:40px;
}
</style>
</head>

<body>

<div id="stars"></div>

<div id="s0" class="screen show">
  <canvas id="treeCanvas"></canvas>
  <div id="clickHeart">💗 Click Me :) Birthday Queen 💗</div>
</div>

<div id="s1" class="screen">
  <h1 id="typing"></h1>
</div>

<div id="s2" class="screen">
  <h1>Get Ready 🎉</h1>
  <h2 id="timer">5</h2>
</div>

<div id="s3" class="screen">
  <h1 id="nameAnim"></h1>
  <div id="cake">🎂</div>
  <button id="blowBtn">Blow Candles 🕯️</button>
</div>

<div id="s4" class="screen">
  <h2>Memory Lane 📸</h2>

  <img class="slide active" src="D1.jpg" data-msg="Some moments don’t ask for attention…<br>they just stay quietly with you.<br>This one feels like that kind of memory.<br>Soft, simple… and somehow important ❤️">

  <img class="slide" src="D2.jpg" data-msg="I don’t remember what we were doing here,<br>but I remember how it felt.<br>There’s something about this moment…<br>that just feels warm and real ✨">

  <img class="slide" src="D3.jpg" data-msg="This picture doesn’t say much out loud,<br>but it says everything I needed to feel.<br>Some memories don’t fade with time…<br>they just become part of you 💭">

  <img class="slide" src="D4.jpg" data-msg="If I could pause time somewhere,<br>it might be in a moment like this.<br>Nothing loud, nothing dramatic…<br>just quietly perfect in its own way 💖">

  <img class="slide" src="D5.jpg" data-msg="And then there are moments like this,<br>that don’t need explaining at all.<br>You just look at them… and smile.<br>Because somehow, they mean everything ❤️">

  <div id="photoMsg">Tap a memory ❤️</div>
</div>

<div id="s5" class="screen">
  <h1 id="finalMsg"></h1>
</div>

<audio id="music" src="song.mp3"></audio>

<script>

let s0=document.getElementById("s0");
let s1=document.getElementById("s1");
let s2=document.getElementById("s2");
let s3=document.getElementById("s3");
let s4=document.getElementById("s4");
let s5=document.getElementById("s5");

/* 🌌 stars */
function createStars(){
  let container=document.getElementById("stars");
  for(let i=0;i<120;i++){
    let s=document.createElement("div");
    s.className="star";
    s.style.left=Math.random()*100+"%";
    s.style.top=Math.random()*100+"%";
    container.appendChild(s);
  }
}
createStars();

/* 🌳 tree */
let canvas=document.getElementById("treeCanvas");
let ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

/* ✅ FIXED TREE DRAW */
function drawTree(x,y,len,angle,depth){
  if(depth===0)return;

  let x2=x+len*Math.cos(angle);
  let y2=y-len*Math.sin(angle);

  ctx.strokeStyle="#ff66aa"; /* FIX */
  ctx.lineWidth=4; /* FIX */
  ctx.beginPath();
  ctx.moveTo(x,y);
  ctx.lineTo(x2,y2);
  ctx.stroke();

  drawTree(x2,y2,len*0.7,angle+0.5,depth-1);
  drawTree(x2,y2,len*0.7,angle-0.5,depth-1);
}

drawTree(canvas.width/2,canvas.height,120,Math.PI/2,9); /* slightly bigger */

/* CLICK */
clickHeart.onclick=()=>{
  switchS(s0,s1);
  type();
};

function switchS(a,b){
  a.classList.remove("show");
  setTimeout(()=>b.classList.add("show"),500);
  window.addEventListener("DOMContentLoaded", () => {
  document.getElementById("blowBtn").addEventListener("click", blow);
});
}

/* typing */
let text="Hey Deesha...<br>There’s something I wanted you to feel 💫";
let i=0;
function type(){
  if(i<text.length){
    typing.innerHTML+=text.charAt(i);
    i++;
    setTimeout(type,40);
  }else{
    setTimeout(()=>{
      switchS(s1,s2);
      startCountdown();
    },1000);
  }
}

/* countdown */
function startCountdown(){
  let t=5;
  timer.innerText=t;
  let cd=setInterval(()=>{
    t--;
    timer.innerText=t;
    if(t==0){
      clearInterval(cd);
      switchS(s2,s3);
    }
  },1000);
}

</script>

</body>
</html>
